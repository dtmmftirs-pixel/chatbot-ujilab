<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Lab - Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      overflow: hidden;
      padding: 15px;
    }
    
    .container {
      max-width: 100%;
      height: 100%;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      background: linear-gradient(135deg, #1a73e8 0%, #0d5bb5 100%);
      color: white;
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    
    .header h1 { 
      font-size: 20px; 
      font-weight: 600;
    }
    
    .user-info { 
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }
    
    #userName {
      font-weight: 600;
      font-size: 14px;
    }
    
    .user-email { 
      font-size: 12px; 
      opacity: 0.9; 
    }

    /* --- TAMBAHAN: Style untuk Badge Role --- */
    .role-badge {
      background: rgba(255, 255, 255, 0.25);
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border: 1px solid rgba(255,255,255,0.4);
    }
    
    .logout-btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.4);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.3s ease;
      margin-top: 4px;
    }
    
    .logout-btn:hover { 
      background: #dc3545; 
      border-color: #dc3545;
    }
    
    .content { 
      padding: 20px 25px;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    
    .content h2 {
      font-size: 18px;
      color: #333;
      margin-bottom: 5px;
    }
    
    .menu-grid {
      /* Diubah ke auto-fit agar lebih responsif di HP (minimal 200px per kartu) */
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 15px;
    }
    
    .menu-card {
      background: linear-gradient(135deg, #f0f7ff 0%, #e3f2fd 100%);
      padding: 20px;
      border-radius: 12px;
      text-decoration: none;
      color: #1a73e8;
      transition: all 0.3s ease;
      border: 2px solid transparent;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .menu-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 15px rgba(26,115,232,0.2);
      border-color: #1a73e8;
    }
    
    .menu-card h3 { 
      margin-bottom: 8px; 
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .menu-card p { 
      font-size: 13px; 
      opacity: 0.85;
      line-height: 1.4;
    }

    .loading-text {
      grid-column: 1 / -1;
      text-align: center;
      color: #666;
      padding: 30px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Smart Lab Dashboard<br>
      Departemen Teknik Material dan Metalurgi</h1>
      <div class="user-info">
        <div id="userName">Memuat data...</div>
        <div class="user-email" id="userEmail"></div>
        <!-- Badge Role Ditambahkan Di Sini -->
        <div class="role-badge" id="userRole">Role: ...</div>
        <button class="logout-btn" onclick="prosesLogout()">🚪 Logout</button>
      </div>
    </div>
    
    <div class="content">
      <h2>Menu Utama</h2>
      <p style="color: #666; font-size: 13px;">Pilih menu yang ingin diakses:</p>
      
      <!-- Container Kosong untuk diisi oleh JavaScript -->
      <div class="menu-grid" id="menuGrid">
        <div class="loading-text">Memuat menu sesuai hak akses...</div>
      </div>
    </div>
  </div>

  <script>
    // 1. Cek sesi - jika tidak ada flag isLoggedIn, redirect ke login
    if (localStorage.getItem('isLoggedIn') !== 'true') {
      window.location.replace('index.html');
    }
    
    // 2. Ambil data user dari localStorage
    const name = localStorage.getItem('user_name') || 'Pengguna';
    const email = localStorage.getItem('user_email') || 'tidak tersedia';
    const role = localStorage.getItem('user_role') || 'users';
    const menusStr = localStorage.getItem('user_menus');
    
    // 3. Tampilkan pesan selamat datang dan role
    document.getElementById('userName').textContent = `Selamat Datang, ${name}`;
    document.getElementById('userEmail').textContent = `dengan email ${email}`;
    
    // Format role agar huruf pertama kapital (users -> Users)
    const formattedRole = role.charAt(0).toUpperCase() + role.slice(1);
    document.getElementById('userRole').textContent = `Role: ${formattedRole}`;
    
    // 4. Fungsi untuk merender menu secara dinamis
    function renderMenus() {
      const menuGrid = document.getElementById('menuGrid');
      menuGrid.innerHTML = ''; // Hapus teks loading
      
      let menus = [];
      
      // Coba parse menu dari localStorage (yang dikirim saat login)
      if (menusStr) {
        try {
          menus = JSON.parse(menusStr);
        } catch (e) {
          console.error("Gagal memparse data menu:", e);
        }
      }
      
      // FALLBACK: Jika data menu kosong (misal user refresh paksa), gunakan default
      if (menus.length === 0) {
        const fallbackMenus = {
          'manajemen': [
            { name: 'Monitoring Pengujian', icon: '📊', link: 'monitoring-pengujian.html' },
            { name: 'Monitoring Alat', icon: '🔧', link: 'monitoring-alat.html' },
            { name: 'Rekap Keuangan', icon: '💰', link: 'rekap-keuangan.html' },
            { name: 'Katalog Lab', icon: '📖', link: 'katalog.html' }
          ],
          'staff': [
            { name: 'Status Pengujian', icon: '📝', link: 'status-pengujian.html' },
            { name: 'Monitoring Pengujian', icon: '📊', link: 'monitoring-pengujian.html' },
            { name: 'Monitoring Alat', icon: '🔧', link: 'monitoring-alat.html' },
            { name: 'Katalog Lab', icon: '📖', link: 'katalog.html' }
          ],
          'users': [
            { name: 'Daftar Pengujian', icon: '📋', link: 'daftar-pengujian.html' },
            { name: 'Status Pengujian', icon: '📝', link: 'status-pengujian.html' },
            { name: 'Katalog Lab', icon: '📖', link: 'katalog.html' }
          ]
        };
        menus = fallbackMenus[role] || fallbackMenus['users'];
      }

      // Buat elemen HTML untuk setiap menu
      menus.forEach(menu => {
        const card = document.createElement('a');
        card.href = menu.link || '#';
        card.className = 'menu-card';
        card.innerHTML = `
          <h3>${menu.icon || '📄'} ${menu.name}</h3>
          <p>Akses fitur ${menu.name.toLowerCase()} laboratorium</p>
        `;
        menuGrid.appendChild(card);
      });
    }

    // Jalankan fungsi render
    renderMenus();
    
    // 5. Fungsi logout - TANPA CONFIRM
    function prosesLogout() {
      // Hapus semua data sesi
      localStorage.clear();
      
      // Redirect ke halaman login
      window.location.replace('index.html');
    }
  </script>
</body>
</html>
